<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paper Plane (Dark)</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        /* Black background version (for blending into dark pages/panels). */
        background: #050506;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #status {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
        user-select: none;
        pointer-events: none;
        color: rgba(255, 255, 255, 0.86);
      }
      #statusStack {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 12px;
      }
      #statusText {
        font: 17px/1.3 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
        font-weight: 600;
        letter-spacing: -0.01em;
        opacity: 0.78;
      }
      @keyframes ldSpin {
        to {
          transform: rotate(360deg);
        }
      }
      #statusSpinner {
        width: 28px;
        height: 28px;
        opacity: 0.9;
        animation: ldSpin 0.9s linear infinite;
      }
      #statusSpinner svg {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="status" role="status" aria-live="polite">
      <div id="statusStack">
        <div id="statusText">Loading…</div>
        <div id="statusSpinner" aria-hidden="true">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" focusable="false">
            <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="3" opacity="0.25" />
            <path
              fill="currentColor"
              opacity="0.75"
              d="M12 3a9 9 0 0 1 9 9h-3a6 6 0 0 0-6-6V3z"
            />
          </svg>
        </div>
      </div>
    </div>
    <script src="./boot.js"></script>
  </body>
</html>
